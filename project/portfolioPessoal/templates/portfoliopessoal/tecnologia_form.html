{% extends "portfoliopessoal/base.html" %}

{% block content %}
<style>
    .form-card {
        max-width: 700px;
        margin: 30px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .form-group {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .form-group label {
        flex: 0 0 180px; /* Largura fixa para as labels */
        font-weight: bold;
        color: #374151;
    }

    .form-group input, 
    .form-group textarea, 
    .form-group select {
        flex: 1;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn-save {
        background: #15803d;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-save:hover {
        background: #166534;
    }

    .btn-cancel {
        color: #6b7280;
        text-decoration: none;
        margin-left: 15px;
        font-size: 14px;
    }
</style>

<div class="form-card">
    <h2 style="margin-top: 0; color: #1e40af; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; margin-bottom: 25px;">
        {{ titulo }}
    </h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
                {{ field }}
                {% if field.errors %}
                    <small style="color: #dc2626; margin-left: 10px;">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
        {% endfor %}
        
        <div style="margin-top: 30px; text-align: right;">
            <a href="{% url 'tecnologias' %}" class="btn-cancel">Cancelar</a>
            <button type="submit" class="btn-save">
                Guardar Tecnologia
            </button>
        </div>
    </form>
</div>
{% endblock %}
