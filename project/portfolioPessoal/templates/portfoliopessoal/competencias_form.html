{% extends "portfoliopessoal/base.html" %}
{% block content %}
<div style="padding-top: 40px; animation: fadeInUp 0.8s ease-out;">
    <a href="{% url 'competencias' %}" class="btn-back">← Voltar às Competências</a>
    <div class="card-content" style="max-width: 800px; margin: auto;">
        <h2 class="hero-subtitle" style="margin-top: 0;">{{ titulo }}<span>.</span></h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; text-align: right;">
                <button type="submit" class="btn-save" style="width: auto; padding: 15px 40px;">Guardar Competência</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
