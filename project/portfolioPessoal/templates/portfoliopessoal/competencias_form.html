{% extends "portfoliopessoal/base.html" %}

{% block content %}
<article>
    <h2 style="color: #1e40af; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;">
        {{ titulo }}
    </h2>
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <button type="submit" class="btn-save">Guardar Competência</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="{% url 'competencias' %}" style="color: #64748b; text-decoration: none;">Cancelar e voltar</a>
            </p>
        </div>
    </form>
</article>
{% endblock %}
