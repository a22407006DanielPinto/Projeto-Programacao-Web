{% extends "portfoliopessoal/base.html" %}
{% block content %}
<article style="max-width: 500px; margin: 40px auto; text-align: center; border: 2px solid #dc2626; padding: 20px; background: white;">
    <h2>Apagar Competência?</h2>
    <p>Queres mesmo eliminar <strong>{{ competencia.nomeCompetencia }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background: #dc2626; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Sim, Apagar</button>
        <a href="{% url 'competencias' %}" style="margin-left: 10px;">Cancelar</a>
    </form>
</article>
{% endblock %}
